<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kyoto Shi Cafe Rayong — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+Thai:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --serif:'Cormorant Garamond','Yu Mincho','Hiragino Mincho ProN',Georgia,serif;
    --sans:'Noto Sans Thai','Segoe UI','Leelawadee UI',system-ui,sans-serif;
  }
  /* ═══ Olive Izakaya theme (locked July 2026) ═══ */
  body{
    --bg:#23271b; --bg2:#262f36; --card:#2a3644; --ink:#f1ecdb; --muted:#a9ab90; --faint:#7c8168;
    --gold:#cfa963; --gold-l:#eed9a6; --hanko:#b04a36; --matcha:#a4bc72; --sea:#8db4d6;
    --line:rgba(207,169,99,.24); --g1:#333a22; --tbar:rgba(28,31,21,.92); --cover:#0f110b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body.noscroll{overflow:hidden}
  [data-en]{display:none}
  body.lang-en [data-en]{display:inline} body.lang-en [data-th]{display:none}

  /* full-screen snap pages (ปก + ไฮไลท์หน้าแรก) */
  .page{height:100vh;height:100svh;scroll-snap-align:start;scroll-snap-stop:always;scroll-margin-top:0}

  /* ── top bar ── */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;background:var(--tbar);backdrop-filter:blur(10px);box-shadow:0 1px 0 var(--line)}
  .tb-l{display:flex;align-items:center;gap:10px;min-width:0}
  .backb{border:1px solid var(--line);background:transparent;color:var(--gold);border-radius:50%;
    width:32px;height:32px;font-size:15px;cursor:pointer;flex:none;display:none;line-height:1}
  .backb.show{display:block}
  .logo{min-width:0}
  .logo .nm{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:2px;display:block;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .logo .nm small{display:block;font-family:var(--sans);font-size:9px;letter-spacing:1.2px;color:var(--muted);font-weight:400;margin-top:1px}
  .lang{display:flex;gap:5px;flex:none}
  .lang button{border:1px solid rgba(241,236,219,.25);background:transparent;color:var(--ink);
    padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .lang button.on{background:var(--gold);border-color:var(--gold);color:#231a0c}

  main{max-width:640px;margin:0 auto}
  .pad{padding:0 16px}

  /* ── PAGE 1: cover (ไล่สี dark → มะกอก) ── */
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:70px 20px 50px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--cover) 0%,var(--bg) 55%,var(--g1) 100%)}
  .hero .vk{position:absolute;right:3vw;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;
    font-family:var(--serif);font-size:clamp(56px,14vw,92px);font-weight:800;letter-spacing:8px;
    color:transparent;-webkit-text-stroke:1px rgba(207,169,99,.2);user-select:none;pointer-events:none}
  .hero h1{font-family:var(--serif);font-size:clamp(42px,10vw,66px);font-weight:600;letter-spacing:4px;
    background:linear-gradient(180deg,#f7f1de,#cfb77e);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .ray{font-family:var(--serif);font-size:13px;letter-spacing:8px;color:var(--muted);margin-top:8px;text-indent:8px}
  .hero .kata{font-size:12px;letter-spacing:6px;color:var(--gold);margin-top:10px;text-indent:6px}
  .hero .shim{width:60px;height:1px;margin:22px auto 0;background:rgba(207,169,99,.3)}
  .hero .sub{font-size:13px;color:var(--muted);letter-spacing:1px;margin-top:16px}
  .downhint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:var(--faint);
    font-size:11px;letter-spacing:3px;animation:bob 2s ease-in-out infinite;cursor:pointer;padding:8px 0}
  .hldown{cursor:pointer}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  /* ── PAGE 2: global highlight (โปสเตอร์ A4 ~80% จอ) ── */
  .hlpage{position:relative;background:radial-gradient(90% 70% at 50% 0%,var(--g1),var(--bg) 74%);overflow:hidden}
  .hlpage .plabel{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:10;white-space:nowrap;
    font-size:10.5px;letter-spacing:4px;color:var(--gold-l);font-weight:700;
    background:rgba(10,12,8,.55);backdrop-filter:blur(6px);border:1px solid var(--line);
    padding:5px 15px 5px 19px;border-radius:16px}
  .hlslides{height:100%;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;
    touch-action:pan-x;overscroll-behavior-x:contain}
  .hlslides::-webkit-scrollbar{display:none}
  .hlslide{flex:0 0 100%;height:100%;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;padding:56px 16px 42px}
  .hlslide .pstr{flex:none;width:min(100%,calc((100svh - 150px)*.707));max-width:none;max-height:100%}
  .hldots{position:absolute;bottom:20px;left:0;right:0;z-index:10;display:flex;justify-content:center;gap:7px}
  .hldots span{width:7px;height:7px;border-radius:4px;background:rgba(241,236,219,.28);transition:.3s}
  .hldots span.on{background:var(--gold);width:22px}
  .hldown{position:absolute;bottom:5px;left:0;right:0;text-align:center;z-index:10;color:var(--faint);
    font-size:10px;letter-spacing:2px;animation:bob 2s ease-in-out infinite}

  /* poster (A4) — ใช้ทั้งหน้าแรกและในหมวด */
  .pstr{position:relative;aspect-ratio:210/297;border-radius:16px;overflow:hidden;
    box-shadow:0 16px 38px rgba(0,0,0,.55);border:1px solid rgba(207,169,99,.2)}
  .pstr img{width:100%;height:100%;object-fit:cover;display:block}
  .pstr.tap{cursor:pointer}
  .ptag{position:absolute;top:15px;left:-32px;transform:rotate(-38deg);z-index:5;font-size:10px;
    font-weight:900;letter-spacing:1.5px;padding:5px 38px;box-shadow:0 3px 10px rgba(0,0,0,.45)}
  .ptag.new{background:var(--hanko);color:#fff}
  .ptag.rec{background:var(--gold);color:#231a0c}

  /* ── category grid (landing) ── */
  .shead{display:flex;align-items:center;gap:14px;margin:30px 2px 8px}
  .shead .no{font-family:var(--serif);font-size:34px;font-weight:700;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(207,169,99,.45)}
  .shead h2{font-size:19px;font-weight:800}
  .shead .sub{font-size:10px;letter-spacing:3px;color:var(--faint);margin-top:3px;text-transform:uppercase}
  .shead .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .snote{font-size:12px;color:var(--muted);line-height:1.7;margin:2px 2px 10px}

  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:12px}
  .catcard{position:relative;border-radius:18px;overflow:hidden;cursor:pointer;aspect-ratio:1/1.02;
    border:1px solid rgba(207,169,99,.18);box-shadow:0 10px 26px rgba(0,0,0,.4);transition:transform .2s,border-color .2s}
  .catcard:hover{transform:translateY(-4px);border-color:rgba(207,169,99,.55)}
  .catcard .cbg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px}
  .catcard .cbg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,.15),transparent 55%)}
  .catcard .csc{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,7,3,.9) 8%,rgba(8,7,3,.25) 55%,transparent)}
  .catcard .ct{position:absolute;left:0;right:0;bottom:0;padding:14px;color:#fff}
  .catcard .cnm{font-size:15.5px;font-weight:800;line-height:1.2}
  .catcard .cen{font-size:9.5px;color:var(--gold-l);margin-top:2px;letter-spacing:1.5px}
  .catcard .chint{font-size:10px;color:rgba(241,236,219,.72);margin-top:5px}
  .catcard .carr{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;
    background:rgba(8,7,3,.5);border:1px solid rgba(207,169,99,.4);color:var(--gold-l);
    display:flex;align-items:center;justify-content:center;font-size:12px}

  /* ── category view ── */
  .cathero{position:relative;padding:76px 18px 22px;text-align:center;overflow:hidden}
  .cathero .cbg2{position:absolute;inset:0;opacity:.5}
  .cathero .csc2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,8,.35),var(--bg))}
  .cathero .e{position:relative;font-size:46px}
  .cathero h1{position:relative;font-size:27px;font-weight:900;margin-top:4px}
  .cathero .en{position:relative;font-size:11px;color:var(--gold);letter-spacing:3px;margin-top:4px;text-transform:uppercase}

  .prow{display:flex;gap:13px;overflow-x:auto;scroll-snap-type:x mandatory;padding:12px 16px 6px;scrollbar-width:none;-ms-overflow-style:none;
    touch-action:pan-x;overscroll-behavior-x:contain}
  .prow::-webkit-scrollbar{display:none}
  .prow .pstr{flex:0 0 76%;max-width:320px;scroll-snap-align:center}
  .swipehint{text-align:center;font-size:10.5px;color:var(--faint);letter-spacing:.4px;margin-top:2px}

  /* signature carousel */
  .sigrow{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:12px 16px 8px;scrollbar-width:none;-ms-overflow-style:none;
    touch-action:pan-x;overscroll-behavior-x:contain}
  .sigrow::-webkit-scrollbar{display:none}
  .sigcard{flex:0 0 58%;max-width:230px;scroll-snap-align:start;position:relative;border-radius:18px;overflow:hidden;cursor:pointer;
    aspect-ratio:4/5;box-shadow:0 12px 28px rgba(0,0,0,.5);border:1px solid rgba(207,169,99,.18);transition:transform .25s,border-color .25s}
  .sigcard:hover{transform:translateY(-5px);border-color:rgba(207,169,99,.5)}
  .sigcard .sgbg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:74px}
  .sigcard .sgbg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 32% 26%,rgba(255,255,255,.15),transparent 55%)}
  .sigcard .sgbg img{width:100%;height:100%;object-fit:cover}
  .sigcard .sgsc{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,4,.93) 6%,rgba(10,8,4,.28) 52%,transparent 74%)}
  .sigcard .sgst{position:absolute;top:10px;left:12px;width:30px;height:30px;background:var(--hanko);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:800;color:#f6ede0;transform:rotate(-6deg);z-index:2}
  .sigcard .sgt{position:absolute;left:0;right:0;bottom:0;padding:13px;z-index:2;color:#fff}
  .sigcard .sgn{font-size:14.5px;font-weight:800;line-height:1.25}
  .sigcard .sgp{margin-top:8px;display:inline-flex;align-items:baseline;gap:3px;background:var(--gold);color:#231a0c;
    font-weight:800;font-size:13px;padding:3px 11px;border-radius:15px}
  .sigcard .sgp .fr{font-size:9px;color:rgba(35,26,12,.6);font-weight:700}

  /* sticky sub-chips */
  #subchips{position:sticky;top:51px;z-index:55;background:var(--tbar);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin-top:8px}
  #subchips .row{display:flex;gap:7px;overflow-x:auto;padding:9px 16px 10px;scrollbar-width:none;-ms-overflow-style:none}
  #subchips .row::-webkit-scrollbar{display:none}
  #subchips a{flex:0 0 auto;text-decoration:none;color:var(--muted);border:1px solid rgba(241,236,219,.14);
    padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:.2s}
  #subchips a.on{color:#231a0c;background:var(--gold);border-color:var(--gold)}
  section[id^="sec-"]{scroll-margin-top:104px}

  /* showcase carousels (beans / fish) */
  .brow{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:12px 16px 6px;scrollbar-width:none;-ms-overflow-style:none;
    touch-action:pan-x;overscroll-behavior-x:contain}
  .brow::-webkit-scrollbar{display:none}
  .bcard{flex:0 0 62%;max-width:220px;scroll-snap-align:start;position:relative;border-radius:18px;overflow:hidden;cursor:pointer;
    aspect-ratio:3/4;box-shadow:0 12px 28px rgba(0,0,0,.5);border:1px solid rgba(207,169,99,.18);transition:transform .25s,border-color .25s}
  .bcard:hover{transform:translateY(-4px);border-color:rgba(207,169,99,.5)}
  .bcard .bbg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:78px}
  .bcard .bbg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,.16),transparent 55%)}
  .bcard .bbg.haspic{font-size:0}.bcard .bbg.haspic::after{background:none}
  .bcard .bbg.haspic img{width:100%;height:100%;object-fit:cover}
  .bcard .bsc{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,7,4,.93) 8%,rgba(10,7,4,.25) 55%,transparent)}
  .bcard .bt{position:absolute;left:0;right:0;bottom:0;padding:12px;z-index:2;color:#fff}
  .bcard .bn{font-size:15px;font-weight:800}
  .bcard .ben{font-size:9.5px;color:var(--gold-l);margin-top:1px;letter-spacing:1.5px}
  .bcard .meter{display:flex;align-items:center;gap:5px;margin-top:8px}
  .bcard .meter .ml{font-size:8px;color:rgba(241,236,219,.7)}
  .bcard .meter .mb{flex:1;height:4px;border-radius:3px;position:relative}
  .bcard.roast .meter .mb{background:linear-gradient(90deg,#d8b482,#8a5330,#38200f)}
  .bcard.fatm .meter .mb{background:linear-gradient(90deg,#b6544a,#e59b78,#f3d9c0)}
  .bcard .meter .mb i{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;background:#fff;border:2px solid #1a0f08;transform:translate(-50%,-50%)}
  .bnotes{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .bnotes span{font-size:9px;color:#f0dcb4;background:rgba(0,0,0,.35);border:1px solid rgba(207,169,99,.35);padding:1px 7px;border-radius:10px}
  .bcard.sold{filter:grayscale(.7);opacity:.62}
  .sbadge{position:absolute;top:9px;right:9px;z-index:3;background:#4a463a;color:#ded9c4;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}

  /* matcha grade bands */
  .grades{display:flex;flex-direction:column;gap:11px;margin-top:12px}
  .gband{display:flex;align-items:center;gap:14px;cursor:pointer;border-radius:16px;background:var(--card);
    border:1px solid rgba(241,236,219,.08);padding:12px 14px;transition:transform .2s,border-color .2s}
  .gband:hover{transform:translateY(-3px);border-color:rgba(164,188,114,.5)}
  .gband .sw{width:56px;height:56px;flex:none;border-radius:50%;position:relative;box-shadow:inset 0 -6px 14px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.4)}
  .gband .sw::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 36% 30%,rgba(255,255,255,.3),transparent 45%)}
  .gband .sw.haspic{overflow:hidden}.gband .sw.haspic::after{background:none}
  .gband .sw.haspic img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .sw.g1{background:linear-gradient(145deg,#c2cd86,#94a552)} .sw.g2{background:linear-gradient(145deg,#82b257,#4f7c2e)} .sw.g3{background:linear-gradient(145deg,#4f7f34,#243f18)}
  .gband .gg{flex:1;min-width:0}
  .gband .gtop{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .gband .gnm{font-family:var(--serif);font-size:18px;font-weight:700}
  .gband .gnm b{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px}
  .gprice{font-size:12px;font-weight:800;padding:3px 10px;border-radius:13px;white-space:nowrap}
  .gprice.inc{background:var(--bg2);border:1px solid var(--line);color:var(--muted)} .gprice.add{background:var(--matcha);color:#15200c}
  .gband .guse{font-size:11px;color:var(--matcha);margin-top:4px}
  .gband .garr{color:var(--faint);font-size:15px;flex:none}

  /* set cards (เซ็ตซาชิมิ) */
  .sets{display:flex;flex-direction:column;gap:12px;margin-top:12px}
  .setc{display:flex;cursor:pointer;border-radius:16px;overflow:hidden;background:var(--card);
    border:1px solid rgba(241,236,219,.08);transition:transform .2s,border-color .2s}
  .setc:hover{transform:translateY(-3px);border-color:rgba(207,169,99,.45)}
  .setc .simg{width:106px;min-width:106px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;overflow:hidden}
  .setc .simg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .setc .sst{position:absolute;top:7px;left:7px;width:26px;height:26px;background:var(--hanko);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:800;color:#f6ede0;transform:rotate(-6deg);font-size:14px;z-index:2}
  .setc .sb{flex:1;padding:12px 13px;min-width:0}
  .setc .snm{font-size:15px;font-weight:800}
  .setc .sv{font-size:11px;color:var(--sea);margin-top:3px}
  .setc .sprev{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
  .setc .sprev span{font-size:9px;color:var(--muted);background:var(--bg2);border:1px solid var(--line);padding:2px 7px;border-radius:10px}
  .setc .spr{margin-top:8px;display:inline-flex;background:var(--gold);color:#231a0c;font-weight:800;font-size:13px;padding:3px 11px;border-radius:15px}
  .setc.sold{opacity:.55} .setc.sold .snm{text-decoration:line-through;color:var(--faint)}

  /* tiles */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  .tile{background:var(--card);border:1px solid rgba(241,236,219,.07);border-radius:16px;overflow:hidden;cursor:pointer;
    position:relative;transition:transform .25s,border-color .25s,box-shadow .25s}
  .tile:hover{transform:translateY(-4px);border-color:rgba(207,169,99,.45);box-shadow:0 12px 28px rgba(0,0,0,.4)}
  .tile .phw{overflow:hidden;position:relative}
  .tile .ph{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;transition:transform .5s}
  .tile:hover .ph{transform:scale(1.06)}
  .ph{position:relative}
  .ph::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.15),transparent 55%)}
  .ph.haspic::after{background:none}
  .ph .cam{position:absolute;bottom:7px;right:9px;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.45);z-index:2}
  .ph .pimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stamp{position:absolute;top:8px;left:8px;width:28px;height:28px;background:var(--hanko);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:800;color:#f6ede0;transform:rotate(-6deg);z-index:2}
  .hotchip{position:absolute;top:10px;right:9px;z-index:2;background:rgba(10,8,5,.65);border:1px solid rgba(192,72,58,.6);
    color:#e88c7d;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
  .tile .info{padding:10px 11px 12px}
  .tile .nm{font-size:12.5px;font-weight:700;line-height:1.3;min-height:32px}
  .tile .pr{margin-top:6px;display:inline-flex;align-items:baseline;gap:4px;background:var(--gold);color:#231a0c;
    font-weight:800;font-size:13.5px;padding:3px 11px;border-radius:15px}
  .tile .pr .fr{font-size:9px;color:rgba(35,26,12,.6);font-weight:700}
  .tile .opt{font-size:10px;color:var(--faint);margin-top:5px;line-height:1.5}
  .modhint{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
  .modhint span{font-size:8.5px;color:var(--muted);background:var(--bg2);border:1px solid var(--line);padding:2px 6px;border-radius:9px}
  .tile.sold .ph{filter:grayscale(.9) brightness(.55)}
  .tile.sold .info{opacity:.45}
  .ribbon{position:absolute;top:14px;right:-34px;transform:rotate(38deg);background:#4a463a;color:#ded9c4;
    font-size:10px;font-weight:700;padding:4px 40px;z-index:5;letter-spacing:1px}

  /* gradients — อาหารเดิม */

<body class="lang-th">

<main><div id="view">
  <div id="boot"><div class="bl">KYOTO SHI CAFE</div><div>กำลังโหลดเมนู...</div></div>
</div></main>

<!-- MODAL -->
<div id="mback" onclick="if(event.target===this)closeM()">
  <div class="msheet">
    <div class="mgal">
      <button class="mx" onclick="closeM()">✕</button>
      <div class="mslides" id="mslides" onscroll="galScroll()"></div>

      <div class="malt" id="malt"></div>

      <p class="mdesc" id="mdesc"></p>
      <div class="mopts" id="mopts"></div>
      <div class="mprice" id="mprice"></div>
      <div class="mnote" id="mnote"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════ STATE ═══════════ */
var LANG='th';
var DB=null, GROUPS=[], CATS=[], POSTERS=[], BEANS=[], GRADES=[], MODG={}, FISHL=[];
var SCREEN='home', CURCAT=null, LSCROLL=0;
var UI={
  from:{th:'เริ่มต้น',en:'from'}, sold:{th:'วันนี้หมด',en:'SOLD OUT'},
  hot:{th:'เผ็ด 🌶',en:'Spicy 🌶'}, choose:{th:'เลือกได้',en:'CHOOSE ONE'},
  sig:{th:'★ เมนูแนะนำ',en:'★ SIGNATURE'}, inc:{th:'รวมในราคา',en:'included'}
};
function t(o){return o?(o[LANG]||o.th||''):''}
function tn(o){return o?(o[LANG]||o.th||[]):[]}

/* ═══════════ HELPERS ═══════════ */
function gcats(gid){var a=[];CATS.forEach(function(c,ci){if(c.group===gid)a.push({c:c,ci:ci})});return a}
function group(gid){var g=null;GROUPS.forEach(function(x){if(x.id===gid)g=x});return g}
function postersFor(cat){return POSTERS.filter(function(p){return (p.cat||'')===cat})}
function fishById(id){var f=null;FISHL.forEach(function(x){if(x.id===id)f=x});return f}
function findItem(id){
  for(var ci=0;ci<CATS.length;ci++){var a=CATS[ci].items;
    for(var ii=0;ii<a.length;ii++)if(a[ii].id===id)return{ci:ci,ii:ii};}
  return null;
}
function priceHTML(it){
  if(it.from)return '<span class="fr">'+t(UI.from)+'</span> ฿'+it.from;
  if(it.mods&&it.mods.length&&it.price)return '<span class="fr">'+t(UI.from)+'</span> ฿'+it.price;
  return '฿'+it.price;
}
function firstPhoto(it){return (it.photos&&it.photos.length)?it.photos[0]:null}
function phBlock(it){
  var p=firstPhoto(it);
  if(p)return '<div class="ph haspic"><img class="pimg" src="'+p+'" alt="" loading="lazy"></div>';
  return '<div class="ph '+(it.g||'g-rice')+'">'+(it.e||'🍽')+'<span class="cam">PHOTO</span></div>';
}
function optPreview(it){
  if(!it.opts||!it.opts.length)return'';
  return '<div class="opt">'+it.opts.map(function(o){return t(o).replace('★ ','★')}).join(' · ')+'</div>';
}
function modHint(it){
  if(!it.mods||!it.mods.length)return'';
  var map={temp:'♨',temp2:'♨',beans:'🫘',grade:'🍵',milk:'🥛'};
  var seen={},ic=[];
  it.mods.forEach(function(k){var s=map[k];if(s&&!seen[s]){seen[s]=1;ic.push('<span>'+s+'</span>')}});
  return ic.length?'<div class="modhint">'+ic.join('')+'</div>':'';
}
function fishPreview(it){
  if(!it.fish||!it.fish.length)return'';
  return '<div class="opt">'+it.fish.map(function(x){var f=fishById(x.f);return f?f.nm:''}).filter(Boolean).join(' · ')+'</div>';
}

/* ═══════════ ROUTING ═══════════ */
function route(){
  var m=(location.hash||'').match(/^#cat=([a-z0-9_]+)/);
  if(m&&group(m[1]))showCat(m[1]);else showHome();
}
window.addEventListener('hashchange',route);
function openCat(gid){if(SCREEN==='home')LSCROLL=window.scrollY;location.hash='cat='+gid;}
function goHome(){location.hash='';}

/* ═══════════ RENDER: HOME ═══════════ */
function posterCard(p,extra){
  var tag='';
  if(p.tag==='new')tag='<span class="ptag new">NEW</span>';
  else if(p.tag==='rec')tag='<span class="ptag rec">'+(LANG==='th'?'แนะนำ':'PICK')+'</span>';
  var cls='pstr'+(p.go?' tap':'');
  var onc=p.go?' onclick="posterGo(\''+p.go+'\')"':'';
  return '<div class="'+cls+'"'+onc+'>'+tag+'<img src="'+p.img+'" alt="" loading="lazy"></div>';
}
function posterGo(go){
  var m=String(go).match(/^cat:([a-z0-9_]+)$/);
  if(m){openCat(m[1]);return;}
  var f=findItem(go);
  if(f)openItem(f.ci,f.ii);
}
function catCard(c){
  return '<div class="catcard rv" onclick="openCat(\''+c.id+'\')"><div class="cbg '+c.g+'">'+c.e+'</div><div class="csc"></div>'
    +'<div class="carr">›</div><div class="ct"><div class="cnm">'+t(c.t)+'</div><div class="cen">'+(c.sub||'')+'</div>'
    +'<div class="chint">'+t(c.hint)+'</div></div></div>';
}
function showHome(){
  SCREEN='home';CURCAT=null;
  document.getElementById('backb').classList.remove('show');
  document.getElementById('tbname').innerHTML='KYOTO SHI CAFE<small>เกียวโตชิคาเฟ่ · RAYONG</small>';
  var gp=postersFor('');
  var h='';
  /* ปก */
  h+='<section class="hero page"><div class="vk">キョウトシ</div>'
    +'<h1>Kyoto Shi Cafe</h1><div class="ray">RAYONG</div><div class="kata">キョウトシ カフェ</div>'
    +'<div class="shim"></div>'
    +'<div class="sub"><span data-th>เกียวโตชิคาเฟ่ ระยอง · คาเฟ่ & ครัวญี่ปุ่น</span><span data-en>JAPANESE CAFÉ &amp; KITCHEN · RAYONG</span></div>'
    +'<div class="downhint" onclick="gotoPage(1)">'+(gp.length?(LANG==='th'?'เลื่อนดูไฮไลท์ ↓':'HIGHLIGHTS ↓'):(LANG==='th'?'เลื่อนดูเมนู ↓':'MENU ↓'))+'</div></section>';
  /* ไฮไลท์ (เต็มจอ) */
  if(gp.length){
    h+='<section class="hlpage page"><div class="plabel">✦ '+(LANG==='th'?'ไฮไลท์':'HIGHLIGHTS')+'</div>'
      +'<div class="hlslides" id="hlslides" onscroll="hlScroll()">'
      +gp.map(function(p){return '<div class="hlslide">'+posterCard(p)+'</div>'}).join('')
      +'</div>'
      +(gp.length>1?'<div class="hldots" id="hldots">'+gp.map(function(_,i){return '<span'+(i?'':' class="on"')+'></span>'}).join('')+'</div>':'')
      +'<div class="hldown" onclick="gotoPage(2)">'+(LANG==='th'?'เลื่อนดูหมวด ↓':'CATEGORIES ↓')+'</div></section>';
  }
  /* เลือกหมวด */
  h+='<div class="pad"><div class="shead rv" style="margin-top:64px"><span class="no">☰</span><div><h2>'
    +(LANG==='th'?'เลือกหมวด':'Categories')+'</h2><div class="sub">Categories</div></div><div class="rule"></div></div>'
    +'<div class="catgrid">'+GROUPS.map(catCard).join('')+'</div></div>';
  h+=footHTML(false);
  document.getElementById('view').innerHTML=h;
  setupReveal();
  requestAnimationFrame(function(){window.scrollTo({top:LSCROLL||0});});
}
var hltick=false;
function hlScroll(){
  if(hltick)return;hltick=true;
  requestAnimationFrame(function(){
    var row=document.getElementById('hlslides');if(!row){hltick=false;return;}
    var idx=Math.round(row.scrollLeft/row.clientWidth);
    document.querySelectorAll('#hldots span').forEach(function(d,i){d.classList.toggle('on',i===idx)});
    hltick=false;
  });
}
function footHTML(showBack){
  return '<footer>'+(showBack?'<div><button class="backfoot" onclick="goHome()">‹ '+(LANG==='th'?'กลับไปเลือกหมวด':'Back to categories')+'</button></div>':'')
    +'<div class="fj">キョウトシ カフェ</div><div class="fb">KYOTO SHI CAFE</div>'
    +'<div style="margin-top:10px"><span data-th>สั่งล่วงหน้าผ่าน LINE · รับที่ร้านได้เลย</span><span data-en>Pre-order via LINE · ready for pickup</span></div>'
    +'<div style="opacity:.55;margin-top:12px">© Kyoto Shi Cafe Rayong · เกียวโตชิคาเฟ่ ระยอง</div></footer>';
}

/* ═══════════ RENDER: CATEGORY ═══════════ */
function sigItems(gid){
  var out=[];
  CATS.forEach(function(c,ci){if(c.group!==gid)return;
    c.items.forEach(function(it,ii){if(it.sig&&!it.sold)out.push({ci:ci,ii:ii,it:it})})});
  return out;
}
function sigCard(x){
  var it=x.it;
  var p=firstPhoto(it);
  var bg=p?'<div class="sgbg"><img src="'+p+'" alt="" loading="lazy"></div>':'<div class="sgbg '+(it.g||'g-rice')+'">'+(it.e||'🍽')+'</div>';
  return '<div class="sigcard" onclick="openItem('+x.ci+','+x.ii+')">'+bg+'<div class="sgsc"></div><div class="sgst">★</div>'
    +'<div class="sgt"><div class="sgn">'+t(it)+'</div><div class="sgp">'+priceHTML(it)+'</div></div></div>';
}
function beanCard(b,i){
  var notes=tn(b.notes).slice(0,3).map(function(n){return '<span>'+n+'</span>'}).join('');
  var bg=b.img?'<div class="bbg haspic"><img src="'+b.img+'" alt="" loading="lazy"></div>':'<div class="bbg '+(b.g||'g-coffee')+'">🫘</div>';
  return '<div class="bcard roast" onclick="openBean(\''+b.id+'\')">'+bg+'<div class="bsc"></div>'

/* ═══════════ PAGE PAGER (ปก/ไฮไลท์: ปัดครั้งเดียว = ไปหน้าถัดไป) ═══════════ */
var pagerLock=false;
function pagesEls(){return document.querySelectorAll('#view .page')}
function pagerZone(){
  if(SCREEN!=='home')return -1;
  if(document.getElementById('mback').classList.contains('open'))return -1;
  var ps=pagesEls();if(!ps.length)return -1;
  var last=ps[ps.length-1];
  var lastBottom=last.offsetTop+last.offsetHeight;
  var y=window.scrollY;
  if(y>=lastBottom-40)return -1;               /* พ้นโซน page แล้ว → เลื่อนอิสระ */
  var idx=0;
  ps.forEach(function(p,i){if(y>=p.offsetTop-40)idx=i});
  return idx;
}
function gotoPage(i){
  var ps=pagesEls();if(!ps.length)return;
  if(i<0)i=0;
  var target;
  if(i>=ps.length){var last=ps[ps.length-1];target=last.offsetTop+last.offsetHeight;}
  else target=ps[i].offsetTop;
  pagerLock=true;
  var startY=window.scrollY;
  try{window.scrollTo({top:target,behavior:'smooth'});}catch(e){}
  /* smooth ไม่ทำงาน (iOS เก่า ฯลฯ) → บังคับกระโดดแบบ instant */
  setTimeout(function(){
    if(window.scrollY===startY&&Math.abs(startY-target)>4){
      var de=document.documentElement,prev=de.style.scrollBehavior;
      de.style.scrollBehavior='auto';
      window.scrollTo(0,target);
      de.style.scrollBehavior=prev;
    }
  },120);
  setTimeout(function(){pagerLock=false;},700);
}
function gotoDir(z,dir){
  var ps=pagesEls(),cur=ps[z];if(!cur){return;}
  /* ถ้ายังไม่ตรงหัวหน้า ให้จัดให้ตรงก่อน */
  if(dir<0&&window.scrollY>cur.offsetTop+40){gotoPage(z);return;}
  gotoPage(z+dir);
}
/* เมาส์/แทร็คแพด */
window.addEventListener('wheel',function(e){
  var z=pagerZone();if(z<0)return;
  e.preventDefault();
  if(pagerLock)return;
  if(Math.abs(e.deltaY)<8)return;
  gotoDir(z,e.deltaY>0?1:-1);
},{passive:false});
/* นิ้วบนมือถือ */
var tchY=null,tchX=null;
window.addEventListener('touchstart',function(e){
  tchY=e.touches[0].clientY;tchX=e.touches[0].clientX;
},{passive:true});
window.addEventListener('touchmove',function(e){
  if(tchY===null)return;
  var z=pagerZone();if(z<0)return;
  var dy=tchY-e.touches[0].clientY,dx=tchX-e.touches[0].clientX;
  if(Math.abs(dx)>Math.abs(dy))return;         /* ปัดแนวนอน (โปสเตอร์) → ปล่อยผ่าน */
  e.preventDefault();                           /* กันหน้าเลื่อนครึ่ง ๆ กลาง ๆ */
  if(pagerLock)return;
  if(Math.abs(dy)>30){gotoDir(z,dy>0?1:-1);tchY=null;}
},{passive:false});
window.addEventListener('touchend',function(){tchY=null;tchX=null;},{passive:true});

  var notes=tn(b.notes).map(function(n){return '<span>'+n+'</span>'}).join('');
  document.getElementById('mopts').innerHTML=
    '<div class="meterM roast"><div class="mkick" style="color:var(--muted)">'+(LANG==='th'?'ระดับคั่ว · อ่อน → เข้ม':'Roast · light → dark')+'</div>'
    +'<div class="mb"><i style="left:'+((b.roast||.5)*100)+'%"></i></div></div>'
    +'<div class="mnotes">'+notes+'</div>';
  document.getElementById('mprice').innerHTML=b.add?('+฿'+b.add):t(UI.inc);
  document.getElementById('mnote').textContent=(LANG==='th'?'เลือกใส่ได้กับเมนูกาแฟทุกแก้ว':'Available on any coffee');
  mOpen();
}
function openGrade(id){
  var g=null;GRADES.forEach(function(x){if(x.id===id)g=x});if(!g)return;
  mReset();
  heroOne(g.img,'g-matcha','🍵');
  document.getElementById('mtags').innerHTML='<span class="mkick">'+(LANG==='th'?'เกรดมัทฉะ':'MATCHA GRADE')+'</span>';
  document.getElementById('mname').textContent=g.nm;
  document.getElementById('malt').textContent=LANG==='th'?(g.thsub||''):'';
  document.getElementById('mdesc').textContent=t(g.desc);
  function barRow(lb,v){return '<div class="barrow"><span class="bl">'+lb+'</span><span class="bt"><i style="width:'+((v||0)*100)+'%"></i></span></div>'}
  var b=g.bars||{};
  document.getElementById('mopts').innerHTML=
    '<div class="mkick" style="color:var(--muted)">'+(LANG==='th'?'เหมาะกับ · ':'For · ')+t(g.use)+'</div>'
    +'<div class="bars">'+barRow(LANG==='th'?'ขม':'Bitter',b.bitter)+barRow(LANG==='th'?'อูมามิ':'Umami',b.umami)+barRow(LANG==='th'?'สีเข้ม':'Color',b.color)+'</div>';
  document.getElementById('mprice').innerHTML=g.price?('+฿'+g.price):t(UI.inc);
  mOpen();
}

/* ═══════════ MISC ═══════════ */
var io;
function setupReveal(){
  if(io)io.disconnect();
  io=new IntersectionObserver(function(es){
    es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target)}});
  },{threshold:.06});
  document.querySelectorAll('.rv').forEach(function(el){io.observe(el)});
}
function setLang(l){
  LANG=l;document.body.className='lang-'+l;
  document.getElementById('lth').classList.toggle('on',l==='th');
  document.getElementById('len').classList.toggle('on',l==='en');
  if(SCREEN==='cat')showCat(CURCAT);else showHome();
}

/* ═══════════ LOAD ═══════════ */
function DBinit(js){
  DB=js;
  GROUPS=js.groups||[];CATS=js.categories||[];POSTERS=js.posters||[];
  BEANS=js.beans||[];GRADES=js.grades||[];MODG=js.modGroups||{};FISHL=js.fish||[];
  route();
}
function showError(){
  document.getElementById('view').innerHTML=
    '<div id="boot"><div class="bl">KYOTO SHI CAFE</div>'
    +'<div>โหลดเมนูไม่สำเร็จ — เช็คอินเทอร์เน็ตแล้วลองใหม่</div>'
    +'<button onclick="location.reload()">ลองอีกครั้ง</button></div>';
}
try{
  var cached=localStorage.getItem('ksmenu3');
  if(cached)DBinit(JSON.parse(cached));
}catch(e){}
fetch('menu.json?t='+Date.now(),{cache:'no-store'})
  .then(function(r){if(!r.ok)throw 0;return r.json()})
  .then(function(js){
    if(js&&js.groups&&js.categories){
      DBinit(js);
      try{localStorage.setItem('ksmenu3',JSON.stringify(js))}catch(e){}
    }else if(!DB)showError();
  })
  .catch(function(){if(!DB)showError();});
</script>
